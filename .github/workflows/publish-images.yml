# Phase 30e — multi-arch image publish to ghcr.io.
#
# Triggers:
#   - Tags `v*.*.*` (release): push images tagged with the version + `latest`
#   - Manual workflow_dispatch (any branch): push images tagged `dev` only
#
# Why ghcr.io and not Docker Hub:
#   - The `morm` username on Docker Hub was registered by an unrelated
#     party in 2019 and is parked. Asking Docker Hub to reclaim it has a
#     low success rate and would introduce a single point of denial.
#   - ghcr.io is namespaced to the GitHub repo owner, free for public
#     images, supports multi-arch out of the box, and aligns with the
#     federation/no-LLC stance (3原則): anyone can fork the repo and host
#     their own mirror under their own ghcr namespace.
#
# Operator setup:
#   1. Push the source repo to GitHub (any account or org).
#   2. Settings → Actions → General → Workflow permissions → check
#      "Read and write permissions" so GITHUB_TOKEN can push to ghcr.
#   3. After the first run, Settings → Packages of the repo → make each
#      image public (otherwise Docker pull requires auth).
#
# Tag a release:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Manual dev build:
#   gh workflow run publish-images.yml

name: publish-images

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # ghcr.io push

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: l1
            dockerfile: docker/Dockerfile.l1
          - service: gateway
            dockerfile: docker/Dockerfile.gateway
          - service: edge
            dockerfile: docker/Dockerfile.edge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/morm-${{ matrix.service }}
          # Tag rules:
          #   v1.2.3 → 1.2.3, 1.2, 1, latest
          #   manual dispatch → dev (no latest)
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=MORM ${{ matrix.service }}
            org.opencontainers.image.description=MORM federated node service (${{ matrix.service }})
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=morm-${{ matrix.service }}
          cache-to: type=gha,scope=morm-${{ matrix.service }},mode=max
